package com.sct.config;

import com.google.gson.*;
import net.fabricmc.loader.api.FabricLoader;
import java.io.*;
import java.lang.reflect.Field;
import java.nio.file.*;

/**
 * Zen-style flat JSON config. Every public static field is auto-saved/loaded.
 * Access via SCTConfig.FIELD_NAME directly anywhere in the mod.
 */
public class SCTConfig {

    // ── Carry Tracker ─────────────────────────────────────────────
    public static boolean carryEnabled        = true;
    public static boolean bossSpawnAlert      = true;
    public static boolean highlightBoss       = true;
    public static boolean highlightCarryPlayer= true;
    public static boolean hudEnabled          = true;
    public static boolean autoDetectKills     = true;
    public static boolean sendCarryCount      = false; // sends kill count to party like Zen does

    // ── HUD position ──────────────────────────────────────────────
    public static int hudX = -1;   // -1 = default (bottom-right)
    public static int hudY = -1;

    // ── Colours (ARGB int) ────────────────────────────────────────
    public static int alertColour      = 0xFFFF4444;
    public static int playerGlowColour = 0xFFFFFF00;

    // ──────────────────────────────────────────────────────────────

    private static final Path CONFIG_PATH =
            FabricLoader.getInstance().getConfigDir().resolve("sct.json");
    private static final Gson GSON = new GsonBuilder().setPrettyPrinting().create();

    public static void load() {
        if (!Files.exists(CONFIG_PATH)) { save(); return; }
        try (Reader r = Files.newBufferedReader(CONFIG_PATH)) {
            JsonObject obj = JsonParser.parseReader(r).getAsJsonObject();
            for (Field f : SCTConfig.class.getDeclaredFields()) {
                if (!java.lang.reflect.Modifier.isStatic(f.getModifiers())) continue;
                if (!obj.has(f.getName())) continue;
                try {
                    f.setAccessible(true);
                    JsonElement el = obj.get(f.getName());
                    if (f.getType() == boolean.class) f.setBoolean(null, el.getAsBoolean());
                    else if (f.getType() == int.class) f.setInt(null, el.getAsInt());
                    else if (f.getType() == long.class) f.setLong(null, el.getAsLong());
                    else if (f.getType() == String.class) f.set(null, el.getAsString());
                } catch (Exception ignored) {}
            }
        } catch (Exception e) { System.err.println("[SCT] Failed to load config: " + e.getMessage()); }
    }

    public static void save() {
        try {
            JsonObject obj = new JsonObject();
            for (Field f : SCTConfig.class.getDeclaredFields()) {
                if (!java.lang.reflect.Modifier.isStatic(f.getModifiers())) continue;
                if (f.getName().startsWith("$")) continue;
                try {
                    f.setAccessible(true);
                    Object val = f.get(null);
                    if (val instanceof Boolean b)  obj.addProperty(f.getName(), b);
                    else if (val instanceof Integer i) obj.addProperty(f.getName(), i);
                    else if (val instanceof Long l)  obj.addProperty(f.getName(), l);
                    else if (val instanceof String s) obj.addProperty(f.getName(), s);
                } catch (Exception ignored) {}
            }
            Files.writeString(CONFIG_PATH, GSON.toJson(obj));
        } catch (Exception e) { System.err.println("[SCT] Failed to save config: " + e.getMessage()); }
    }
}

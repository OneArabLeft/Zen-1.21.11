name: Build JAR

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Fix Gradle files
        run: python3 fix_gradle.py

      - name: Build
        run: gradle build --no-daemon --info 2>&1 | tail -100

      - name: List ALL build output
        run: find build/ -type f 2>/dev/null || echo "no build dir"

      - uses: actions/upload-artifact@v4
        with:
          name: slayer-carry-tracker
          path: build/libs/slayer-carry-tracker-*.jar
          if-no-files-found: warn

name: Build JAR

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download wrapper jar and gradlew
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://services.gradle.org/distributions/gradle-8.8-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/refs/tags/v8.8.0/subprojects/wrapper/src/main/executable/gradlew" \
            -o gradlew
          chmod +x gradlew
          printf "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.8-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n" \
            > gradle/wrapper/gradle-wrapper.properties

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: slayer-carry-tracker
          path: build/libs/slayer-carry-tracker-*.jar
          if-no-files-found: error

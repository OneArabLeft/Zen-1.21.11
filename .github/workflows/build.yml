          open('settings.gradle','w').write('''
          pluginManagement {
              repositories {
                  maven { name = \"Fabric\"; url = \"https://maven.fabricmc.net/\" }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          ''')
          open('build.gradle','w').write('''
          plugins { id \"fabric-loom\" version \"1.7-SNAPSHOT\" }
          version = \"1.0.0\"
          group = \"com.sct\"
          base { archivesName = \"slayer-carry-tracker\" }
          repositories {}
          dependencies {
              minecraft \"com.mojang:minecraft:1.21.1\"
              mappings \"net.fabricmc:yarn:1.21.1+build.3:v2\"
